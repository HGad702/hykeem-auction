<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hykeem G's Art</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --white:#FFFFFF;--off:#F8F7F5;--warm:#F2F0ED;--border:#E8E5E0;--bd:#D4CFC8;
  --text:#1A1814;--sec:#6B6760;--muted:#A8A49E;
  --purple:#5B3FD4;--pl:#EEE9FF;--pm:#7B5FE8;
  --coral:#E8522A;--cl:#FDF0EB;
  --green:#2D7A4F;--gl:#EAF5EF;
  --gold:#C4923A;--goldl:#FEF6EC;
  --red:#D63B3B;--redl:#FEF2F2;
  --blue:#1D6FD4;
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
  --r:12px;--rs:8px;--rp:100px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh}
button,input,select,textarea{font-family:'DM Sans',sans-serif}
.topnav{background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.nav-logo{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--text)}
.nav-logo span{color:var(--purple)}
.nav-back{font-size:13px;color:var(--sec);background:none;border:none;cursor:pointer}
.nav-img{height:30px;width:auto;object-fit:contain}
.nav-lock{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px}
.nav-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:var(--rp);background:var(--gl);color:var(--green)}
/* PIN */
.pin-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1A1814 0%,#2D1F6E 100%);padding:20px}
.pin-card{background:var(--white);border-radius:20px;padding:32px 28px;width:100%;max-width:320px;text-align:center;box-shadow:var(--shadow-lg)}
.pin-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:4px}
.pin-logo span{color:var(--purple)}
.pin-sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:24px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.pin-dot.on{background:var(--purple);border-color:var(--purple)}
.pin-dot.err{background:var(--red);border-color:var(--red)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}
.pin-btn{background:var(--off);border:1px solid var(--border);border-radius:var(--rs);padding:16px;font-size:20px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s}
.pin-btn:hover{background:var(--pl);border-color:var(--purple);color:var(--purple)}
.pin-btn:active{transform:scale(.95)}
.pin-err{font-size:12px;color:var(--red);margin-top:8px;min-height:18px}
/* TABS */
.tabbar{background:var(--white);border-bottom:1px solid var(--border);display:flex;overflow-x:auto}
.tabbar::-webkit-scrollbar{display:none}
.tabbtn{flex-shrink:0;padding:12px 16px;font-size:12px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer}
.tabbtn.on{color:var(--purple);border-bottom-color:var(--purple)}
/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 14px 0}
.sc{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;box-shadow:var(--shadow)}
.sc-lbl{font-size:9px;color:var(--muted);letter-spacing:.07em;font-weight:600;text-transform:uppercase;margin-bottom:4px}
.sc-val{font-size:20px;font-weight:600}
.sc-sub{font-size:10px;color:var(--muted);margin-top:2px}
.c-purple{color:var(--purple)}.c-green{color:var(--green)}.c-gold{color:var(--gold)}
/* SOURCE */
.src-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin:10px 14px 0;box-shadow:var(--shadow)}
.src-ttl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.src-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.src-lbl{font-size:12px;color:var(--sec);width:90px;flex-shrink:0}
.src-bg{flex:1;height:7px;background:var(--warm);border-radius:4px;overflow:hidden}
.src-bar{height:100%;border-radius:4px;transition:width .5s}
.src-qr{background:var(--purple)}.src-web{background:var(--blue)}.src-dir{background:var(--gold)}
.src-n{font-size:11px;font-weight:600;width:28px;text-align:right}
/* AUCTION CARDS */
.cards-wrap{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.cards-tb{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.acard{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--purple);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
.acard.closed{border-left-color:var(--bd)}.acard.res-met{border-left-color:var(--green)}
.acard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.acard-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:2px}
.acard-meta{font-size:11px;color:var(--muted)}
.acard-timer{font-size:16px;font-weight:600;color:var(--red);font-variant-numeric:tabular-nums}
.acard-timer.safe{color:var(--sec);font-size:13px}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.bdg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--rp);letter-spacing:.04em}
.bdg-live{background:var(--gl);color:var(--green)}.bdg-closed{background:var(--warm);color:var(--muted)}
.bdg-met{background:var(--gl);color:var(--green)}.bdg-notmet{background:var(--redl);color:var(--red)}
.bdg-timed{background:var(--pl);color:var(--purple)}.bdg-open{background:var(--goldl);color:var(--gold)}
.bdg-paid{background:var(--gl);color:var(--green)}
.acard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.astat{background:var(--off);border-radius:var(--rs);padding:8px}
.astat-lbl{font-size:9px;color:var(--muted);letter-spacing:.06em;margin-bottom:3px}
.astat-val{font-size:15px;font-weight:600}
.rbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.rfill{height:100%;border-radius:2px;transition:width .4s}
.rfill-met{background:var(--green)}.rfill-part{background:var(--purple)}
.feed-mini{background:var(--off);border-radius:var(--rs);overflow:hidden;margin-bottom:10px;margin-top:8px}
.feed-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid var(--border);font-size:12px}
.feed-row:last-child{border:none}
.ftag{background:var(--pl);color:var(--purple);border-radius:var(--rp);padding:1px 7px;font-size:11px;font-weight:600}
.ftag-p{background:var(--warm);color:var(--sec)}
.ft{font-size:10px;color:var(--muted);margin-left:5px}
.famt{font-weight:600}.famt-p{color:var(--muted)}
.winner-box{background:var(--goldl);border:1.5px solid #F5D99A;border-radius:var(--rs);padding:12px;margin-bottom:10px}
.winner-ttl{font-size:10px;font-weight:600;color:var(--gold);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.winner-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #F5D99A;font-size:12px}
.winner-row:last-child{border:none}
.wk{color:var(--sec)}.wv{font-weight:600}
.card-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
/* BUTTONS */
.btn{border-radius:var(--rs);padding:8px 12px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--off);color:var(--text);cursor:pointer;transition:all .15s}
.btn-sm{padding:6px 10px;font-size:11px}
.btn-full{width:100%;text-align:center;padding:12px;font-size:14px}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-ttl{font-family:'Playfair Display',serif;font-size:18px;font-weight:600}
.modal-x{background:var(--warm);border:none;border-radius:50%;width:30px;height:30px;font-size:14px;color:var(--sec);cursor:pointer}
.field{margin-bottom:10px}
.fl{font-size:10px;font-weight:600;color:var(--sec);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:4px}
.fi{width:100%;background:var(--off);border:1.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:14px;color:var(--text);outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--purple);background:var(--white)}
.fi-note{font-size:11px;color:var(--muted);margin-top:3px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fsec{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:10px 0 6px;border-top:1px solid var(--border);margin-top:4px}
/* ANNOUNCE */
.ann-box{background:var(--gl);border:1.5px solid #A8DFC0;border-radius:var(--r);padding:16px;text-align:center;margin-bottom:14px}
.ann-icon{font-size:36px;margin-bottom:8px}
.ann-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--green);margin-bottom:4px}
.ann-body{font-size:13px;color:#3B7A55;line-height:1.5}
/* GUIDES */
.guide-wrap{padding:14px;display:flex;flex-direction:column;gap:12px}
.gcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.gcard-ttl{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;margin-bottom:3px}
.gcard-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.gstep{display:flex;gap:10px;margin-bottom:12px}
.gnum{width:24px;height:24px;border-radius:50%;background:var(--purple);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.gstep-ttl{font-size:13px;font-weight:600;margin-bottom:2px}
.gstep-desc{font-size:12px;color:var(--sec);line-height:1.55}
.gnote{background:var(--pl);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--purple);line-height:1.5;margin-top:10px}
/* AUCTION PAGE */
.art-zone{position:relative;background:var(--warm);width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;overflow:hidden}
.art-zone img{width:100%;height:100%;object-fit:cover}
.art-ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted)}
.art-ph span{font-size:11px;letter-spacing:.08em}
.apill{position:absolute;display:flex;align-items:center;gap:5px;border-radius:var(--rp);padding:4px 10px;font-size:10px;font-weight:600;letter-spacing:.06em}
.apill-live{top:12px;left:12px;background:rgba(255,255,255,.95);color:var(--purple);border:1.5px solid var(--purple)}
.apill-oo{top:12px;right:12px;background:rgba(255,255,255,.92);color:var(--sec);border:1px solid var(--border)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--purple);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.bid-banner{background:var(--purple);padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.bb-lbl{font-size:9px;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.bb-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;color:#fff;line-height:1}
.bb-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
.bb-timer{font-size:20px;font-weight:600;color:#FFB3A7;line-height:1;font-variant-numeric:tabular-nums;text-align:right}
.bb-timer.urgent{color:#FF6B6B;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.content{padding:14px 16px;display:flex;flex-direction:column;gap:13px}
.ptitle{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;margin-bottom:3px;line-height:1.2}
.pmeta{font-size:12px;color:var(--sec)}
.urg-bar{background:var(--cl);border:1px solid #F5C9B8;border-radius:var(--rs);padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#8B3218}
.urg-dot{width:7px;height:7px;border-radius:50%;background:var(--coral);flex-shrink:0;animation:blink 1.4s infinite}
.res-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.res-lbl{font-size:10px;color:var(--muted);letter-spacing:.07em;font-weight:500;text-transform:uppercase}
.res-met{font-size:11px;color:var(--green);font-weight:600}
.res-nm{font-size:11px;color:var(--muted);font-weight:500}
.sec-ttl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.feed-cnt{background:var(--pl);color:var(--purple);border-radius:var(--rp);padding:1px 8px;font-size:10px;font-weight:600}
.feed{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.feed-item{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-bottom:1px solid var(--border)}
.feed-item:last-child{border:none}
.feed-item-top{background:var(--white)}.feed-item-past{background:var(--off)}
.feed-tag-top{background:var(--pl);color:var(--purple);border:1.5px solid #C5B8F5;border-radius:var(--rp);padding:3px 10px;font-size:12px;font-weight:600}
.feed-tag-past{background:var(--warm);color:var(--sec);border-radius:var(--rp);padding:3px 10px;font-size:12px}
.feed-time{font-size:10px;color:var(--muted)}
.feed-top-amt{font-size:15px;font-weight:600;color:var(--text)}
.feed-past-amt{font-size:13px;color:var(--muted)}
.feed-empty{padding:20px;text-align:center;font-size:13px;color:var(--muted)}
.stmt{background:var(--warm);border-radius:var(--r);padding:14px}
.stmt-q{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:var(--sec);line-height:1.7;margin-bottom:8px}
.stmt-sig{font-size:11px;color:var(--muted)}
.stmt-sig a{color:var(--purple);text-decoration:none}
.form-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.form-ttl{font-size:10px;font-weight:600;color:var(--text);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
.fld{margin-bottom:10px}
.fld-lbl{font-size:10px;font-weight:500;color:var(--sec);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:5px}
.fld-inp{width:100%;background:var(--off);border:1.5px solid var(--border);border-radius:var(--rs);padding:11px 13px;font-size:15px;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
.fld-inp::placeholder{color:var(--muted);font-size:14px}
.fld-inp:focus{border-color:var(--purple);background:var(--white);box-shadow:0 0 0 3px rgba(91,63,212,.1)}
.fld-inp-bid{border-color:var(--purple);background:var(--pl);color:var(--purple);font-weight:600;font-size:18px}
.fld-note{font-size:11px;color:var(--muted);margin-top:4px}
.fld-err{font-size:11px;color:var(--red);margin-top:4px;font-weight:500}
.sms-row{display:flex;align-items:flex-start;gap:10px;background:var(--pl);border-radius:var(--rs);padding:11px 12px;margin-bottom:12px;cursor:pointer;border:1.5px solid transparent}
.sms-row.ck{border-color:#C5B8F5}
.sms-chk{width:18px;height:18px;border-radius:4px;border:2px solid #C5B8F5;background:var(--white);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.sms-chk.ck{background:var(--purple);border-color:var(--purple)}
.sms-chk-mark{color:#fff;font-size:11px;font-weight:700}
.sms-lbl{font-size:12px;color:var(--purple);line-height:1.45;font-weight:500}
.btn-bin{width:100%;background:var(--white);border:2px solid var(--coral);border-radius:var(--rs);padding:12px;text-align:center;cursor:pointer;margin-bottom:8px}
.btn-bin-top{font-size:9px;color:var(--coral);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.btn-bin-val{font-size:16px;font-weight:600;color:var(--coral)}
.btn-place{width:100%;background:var(--purple);border:none;border-radius:var(--rs);padding:15px;text-align:center;cursor:pointer;box-shadow:0 4px 16px rgba(91,63,212,.35)}
.btn-place:disabled{background:var(--bd);box-shadow:none;cursor:not-allowed}
.btn-place-txt{font-size:15px;font-weight:600;color:#fff;letter-spacing:.02em}
.form-foot{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.5}
.trust-row{display:flex;justify-content:center;gap:14px;padding:10px 0 4px;flex-wrap:wrap}
.trust-item{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
.trust-dot{width:4px;height:4px;border-radius:50%;background:var(--green)}
.success-card{background:var(--gl);border:1.5px solid #A8DFC0;border-radius:var(--r);padding:20px;text-align:center}
.success-icon{font-size:32px;margin-bottom:10px}
.success-ttl{font-family:'Playfair Display',serif;font-size:18px;color:var(--green);margin-bottom:6px}
.success-body{font-size:13px;color:#3B7A55;line-height:1.55}
.success-rebid{margin-top:14px;background:var(--purple);color:#fff;border:none;border-radius:var(--rs);padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer}
.closed-banner{background:var(--redl);border:1px solid #FECACA;border-radius:var(--rs);padding:10px 14px;text-align:center;font-size:13px;font-weight:600;color:var(--red)}
.gallery-page{padding:14px 16px}
.gallery-grid{display:flex;flex-direction:column;gap:12px}
.gcard2{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--purple);border-radius:var(--r);overflow:hidden;cursor:pointer;box-shadow:var(--shadow)}
.gcard2-img{height:170px;background:var(--warm);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;letter-spacing:.08em;overflow:hidden;position:relative}
.gcard2-img img{width:100%;height:100%;object-fit:cover}
.gcard2-body{padding:13px 14px}
.gcard2-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.gcard2-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;flex:1;margin-right:8px;line-height:1.2}
.gcard2-fmt{font-size:9px;font-weight:600;color:var(--purple);background:var(--pl);border-radius:var(--rp);padding:3px 8px;white-space:nowrap;flex-shrink:0}
.gcard2-meta{font-size:11px;color:var(--sec);margin-bottom:10px}
.gcard2-div{height:1px;background:var(--border);margin-bottom:10px}
.gcard2-row{display:flex;justify-content:space-between;align-items:flex-end}
.gcard2-bid-lbl{font-size:9px;color:var(--muted);letter-spacing:.07em;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.gcard2-bid{font-size:20px;font-weight:600;color:var(--purple);font-family:'Playfair Display',serif}
.gcard2-right{text-align:right}
.gcard2-timer{font-size:12px;color:var(--red);font-weight:600}
.gcard2-open{font-size:11px;color:var(--muted)}
.gcard2-bids{font-size:10px;color:var(--muted);margin-top:2px}
.gcard2-bar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.gcard2-fill{height:100%;border-radius:2px}
.gcard2-fill-prog{background:var(--purple)}.gcard2-fill-met{background:var(--green)}
.gbadge{position:absolute;top:8px;left:8px;background:rgba(255,255,255,.96);border:1.5px solid var(--purple);color:var(--purple);border-radius:var(--rp);padding:3px 8px;font-size:9px;font-weight:600;letter-spacing:.06em;display:flex;align-items:center;gap:4px}
.hero{background:linear-gradient(135deg,#1A1814 0%,#2D1F6E 100%);padding:24px 16px 18px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(91,63,212,.3)}
.hero::after{content:"";position:absolute;bottom:-30px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(196,146,58,.15)}
.hero-inner{position:relative;z-index:1}
.hero-eye{font-size:10px;font-weight:600;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.hero-ttl{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;color:#fff;margin-bottom:5px;line-height:1.15}
.hero-sub{font-size:13px;color:rgba(255,255,255,.55)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--muted)}
.page{max-width:480px;margin:0 auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 20px;border-radius:var(--rp);font-size:13px;font-weight:500;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-success{background:var(--green)}.toast-error{background:var(--red)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
@media(min-width:520px){.page{border-left:1px solid var(--border);border-right:1px solid var(--border);min-height:100vh;background:var(--white)}}
@media(min-width:768px){.stats-bar{grid-template-columns:repeat(4,1fr);padding:14px 20px 0}.cards-wrap,.gallery-page{padding:14px 20px}}
</style>

  _tick:null,_achan:null,_dchans:[],

const fmt=n=>"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:0});
const ago=ts=>{const d=Math.floor((Date.now()-new Date(ts))/1000);if(d<60)return d+"s ago";if(d<3600)return Math.floor(d/60)+"m ago";return Math.floor(d/3600)+"h ago";};
const cd=e=>{if(!e)return null;const d=Math.floor((new Date(e)-Date.now())/1000);if(d<=0)return"Ended";const h=Math.floor(d/3600),m=Math.floor((d%3600)/60),s=d%60;if(h>0)return h+"h "+m+"m";return m+"m "+String(s).padStart(2,"0")+"s";};
const pct=p=>Math.min(100,Math.round(((p.current_bid||p.starting_bid)/p.reserve_price)*100));
const met=p=>(p.current_bid||0)>=p.reserve_price;
const ini=n=>n.trim().split(" ").map(w=>w[0]||"").join("").toUpperCase().slice(0,2);
const minBid=p=>(p.current_bid||p.starting_bid)+5;
const fmtFmt=f=>f==="timed"?"TIMED":f==="open"?"OPEN":"FIXED";
const toast=(m,t="")=>{const el=document.getElementById("toast");el.textContent=m;el.className="toast show"+(t?" toast-"+t:"");setTimeout(()=>el.className="toast",3000);};
// DATA
async function loadPieces(){const{data}=await sb.from("pieces").select("*").order("created_at");S.pieces=data||[];}
async function loadABids(id){const{data}=await sb.from("bids").select("*,bidders(name,phone,email)").eq("piece_id",id).order("created_at",{ascending:false}).limit(8);S.abids=data||[];}
async function loadDBids(id){const{data}=await sb.from("bids").select("*,bidders(name,phone,email)").eq("piece_id",id).order("created_at",{ascending:false}).limit(5);S.dbids[id]=data||[];}
async function loadAllDBids(){for(const p of S.pieces)await loadDBids(p.id);}
async function loadPiece(id){const{data}=await sb.from("pieces").select("*").eq("id",id).single();if(data){const i=S.pieces.findIndex(p=>p.id===id);if(i>-1)S.pieces[i]=data;else S.pieces.push(data);if(S.current?.id===id)S.current=data;}}
function loadVisitors(){S.visitors=JSON.parse(localStorage.getItem("hg_v")||'{"qr":0,"web":0,"direct":0}');}
function trackVisit(src){const v=JSON.parse(localStorage.getItem("hg_v")||'{"qr":0,"web":0,"direct":0}');v[src]=(v[src]||0)+1;localStorage.setItem("hg_v",JSON.stringify(v));}
// PIN
function pinPress(n){
  if(S.pin.length>=4)return;
  S.pin+=n;render();
  if(S.pin.length===4){
    setTimeout(async()=>{
      if(S.pin===PIN){S.mode="dashboard";S.pin="";S.pinErr="";await initDash();}
      else{S.pinErr="Incorrect PIN";S.pin="";render();setTimeout(()=>{S.pinErr="";render();},1500);}
    },100);
  }
}
function pinClear(){S.pin=S.pin.slice(0,-1);render();}
// AUCTION
async function goToPiece(p){S.mode="piece";S.current=p;S.abids=[];S.asucceeded=false;S.aform={name:"",email:"",phone:"",amount:"",sms:true};S.aerrors={};render();await loadABids(p.id);subAuction(p.id);render();}
function goGallery(){S.mode="gallery";S.current=null;S.asucceeded=false;loadPieces().then(render);}
function aUpdate(f,v){S.aform[f]=v;if(S.aerrors[f]){delete S.aerrors[f];render();}}
function toggleSMS(){S.aform.sms=!S.aform.sms;render();}
async function submitBid(){
  const p=S.current;const{name,email,phone,amount,sms}=S.aform;const err={};
  if(!name.trim())err.name="Name required";
  if(!email.trim()||!email.includes("@"))err.email="Valid email required";
  if(!phone.trim()||phone.replace(/\D/g,"").length<10)err.phone="Valid phone required";
  const num=parseFloat(amount);
  if(!amount||isNaN(num))err.amount="Enter a bid";
  else if(num<minBid(p))err.amount="Minimum "+fmt(minBid(p));
  if(Object.keys(err).length){S.aerrors=err;render();return;}
  S.asubmitting=true;S.aerrors={};render();
  try{
    let bid;
    const{data:ex}=await sb.from("bidders").select("id").eq("email",email).maybeSingle();
    if(ex){bid=ex.id;}
    else{const{data:nb,error:be}=await sb.from("bidders").insert({name:name.trim(),email:email.trim(),phone:phone.trim(),sms_opt_in:sms}).select("id").single();if(be)throw be;bid=nb.id;}
    const{error:be}=await sb.from("bids").insert({piece_id:p.id,bidder_id:bid,amount:num});
    if(be)throw be;
    S.asucceeded=true;S.asubmitting=false;toast("Bid of "+fmt(num)+" placed!","success");
    await loadPiece(p.id);await loadABids(p.id);render();
  }catch(e){console.error(e);S.asubmitting=false;toast("Something went wrong. Try again.","error");render();}
}
async function submitBIN(){
  const{name,email,phone}=S.aform;const err={};
  if(!name.trim())err.name="Name required";
  if(!email.trim()||!email.includes("@"))err.email="Valid email required";
  if(!phone.trim()||phone.replace(/\D/g,"").length<10)err.phone="Valid phone required";
  if(Object.keys(err).length){S.aerrors=err;render();toast("Fill in your details first","error");return;}
  toast("Buy It Now! We will contact you shortly.","success");
}
function subAuction(id){
  if(S._achan)sb.removeChannel(S._achan);
  S._achan=sb.channel("a-"+id).on("postgres_changes",{event:"INSERT",schema:"public",table:"bids",filter:"piece_id=eq."+id},async()=>{await loadPiece(id);await loadABids(id);render();}).subscribe();
}
// DASHBOARD
async function initDash(){loadVisitors();await loadPieces();await loadAllDBids();subDash();render();}
function subDash(){
  S._dchans.forEach(c=>sb.removeChannel(c));S._dchans=[];
  const c=sb.channel("dash")
    .on("postgres_changes",{event:"*",schema:"public",table:"bids"},async pl=>{if(pl.new?.piece_id){await loadDBids(pl.new.piece_id);await loadPiece(pl.new.piece_id);render();}})
    .on("postgres_changes",{event:"*",schema:"public",table:"pieces"},async()=>{await loadPieces();await loadAllDBids();render();})
    .subscribe();
  S._dchans.push(c);
}
async function openAuction(id){
  const p=S.pieces.find(x=>x.id===id);
  const upd={closed:false,starts_at:new Date().toISOString()};
  if(p.format==="timed"&&p.duration_minutes)upd.ends_at=new Date(Date.now()+p.duration_minutes*60000).toISOString();
  await sb.from("pieces").update(upd).eq("id",id);
  toast("Auction opened!","success");await loadPieces();await loadAllDBids();render();
}
async function closeAuction(id){await sb.from("pieces").update({closed:true}).eq("id",id);toast("Closed.");await loadPieces();await loadAllDBids();render();}
async function closeAll(){
  if(!confirm("Close ALL active auctions?"))return;
  for(const p of S.pieces.filter(x=>!x.closed))await sb.from("pieces").update({closed:true}).eq("id",p.id);
  toast("All closed.");await loadPieces();await loadAllDBids();render();
}
async function deletePiece(id){if(!confirm("Delete this piece and all bids?"))return;await sb.from("pieces").delete().eq("id",id);toast("Deleted.");await loadPieces();await loadAllDBids();render();}
async function markPaid(id){await sb.from("pieces").update({winner_paid:true}).eq("id",id);toast("Marked as paid","success");await loadPieces();render();}
function openAdd(){S.dmodal="add";S.dform={title:"",medium:"",dimensions:"",year:new Date().getFullYear(),description:"",starting_bid:"",reserve_price:"",buy_it_now_price:"",format:"timed",duration_minutes:60};render();}
function openEdit(p){S.dmodal="edit";S.editP=p;S.dform={title:p.title||"",medium:p.medium||"",dimensions:p.dimensions||"",year:p.year||new Date().getFullYear(),description:p.description||"",starting_bid:p.starting_bid||"",reserve_price:p.reserve_price||"",buy_it_now_price:p.buy_it_now_price||"",format:p.format||"timed",duration_minutes:p.duration_minutes||60};render();}
function closeModal(){S.dmodal=null;S.editP=null;render();}
function setDF(k,v){S.dform[k]=v;render();}
async function saveP(){
  const f=S.dform;
  if(!f.title.trim()){toast("Title required","error");return;}
  if(!f.starting_bid||!f.reserve_price){toast("Bid and reserve required","error");return;}
  const d={title:f.title.trim(),medium:f.medium.trim(),dimensions:f.dimensions.trim(),year:parseInt(f.year)||new Date().getFullYear(),description:f.description.trim(),starting_bid:parseFloat(f.starting_bid),reserve_price:parseFloat(f.reserve_price),buy_it_now_price:f.buy_it_now_price?parseFloat(f.buy_it_now_price):null,format:f.format,duration_minutes:f.format==="timed"?parseInt(f.duration_minutes):null};
  if(S.dmodal==="edit"&&S.editP){await sb.from("pieces").update(d).eq("id",S.editP.id);toast("Updated!","success");}
  else{await sb.from("pieces").insert({...d,current_bid:null,bid_count:0,closed:true});toast("Piece added!","success");}
  closeModal();await loadPieces();await loadAllDBids();render();
}
function openAnnounce(p){S.announcing=p;render();}
function closeAnnounce(){S.announcing=null;render();}
// RENDER PIN
function rPin(){
  const dots=[0,1,2,3].map(i=>`<div class="pin-dot${i<S.pin.length?" on":""}${S.pinErr?" err":""}"></div>`).join("");
  const nums=["1","2","3","4","5","6","7","8","9","","0","x"];
  const btns=nums.map(n=>n===""?"<div></div>":n==="x"?`<button class="pin-btn" onclick="pinClear()">&#9003;</button>`:`<button class="pin-btn" onclick="pinPress('${n}')">${n}</button>`).join("");

  clearInterval(S._tick);
  S._tick=setInterval(()=>{
    if(S.mode==="piece"&&S.current?.ends_at){const el=document.getElementById("cd");if(el)el.textContent=cd(S.current.ends_at);}
    if(S.mode==="dashboard"){S.pieces.forEach(p=>{if(p.ends_at&&!p.closed){const el=document.getElementById("dt-"+p.id);if(el)el.textContent=cd(p.ends_at);}});}
  },1000);
}
// INIT
async function init(){
  document.getElementById("app").innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-txt">Loading...</div></div>';
  if(!IS_DASH){
    const src=new URLSearchParams(window.location.search).get("source")||"direct";
    trackVisit(src);
    await loadPieces();
    const pid=new URLSearchParams(window.location.search).get("piece");
    if(pid){const p=S.pieces.find(x=>x.id===pid);if(p){await goToPiece(p);return;}}
    render();
    setInterval(()=>{if(S.mode==="gallery")loadPieces().then(render);},30000);
  } else {
    render();
  }
}
init();
</script>
</body>
